<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Tag</title>
</head>

<style>
    table {
        border: 1px solid black;
        border-collapse: collapse;
    }

    th,
    td {
        border: 1px solid black;
        padding: 12px;
    }
</style>

<body>
    <h1>Table 기본</h1>
    <table>
        <caption>프로필 테이블</caption>
        <tr>
            <th>이름</th>
            <th>취미</th>
            <th>특기</th>
        </tr>
        <tr>
            <th>조은동</th>
            <th>냄새맡기</th>
            <th>집 지키기</th>
        </tr>
        <tr>
            <th>황초롱</th>
            <th>사냥</th>
            <th>햇볕쬐기</th>
        </tr>
    </table>
</body>

</html>
